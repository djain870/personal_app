{% extends "base.html" %}

{% block title %}News - Personal App{% endblock %}

{% block content %}
    <h1>📰 Top News</h1>
    <div class="news-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        {% for a in articles %}
        <div class="card" style="background: var(--glass); padding: 20px; border-radius: 15px;">
            <h3>{{ a.title }}</h3>
            <p>{{ a.description }}</p>
            <a href="{{ a.url }}" target="_blank" style="color: #fbbf24; text-decoration: none;">Read More ↗</a>
        </div>
        {% endfor %}
    </div>
{% endblock %}
